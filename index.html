<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLTMASTER PRO v1.3 | ST-COMPLIANT DESIGN</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root { --bg:#020617; --card:#111827; --accent:#22c55e; --text:#94a3b8; --border:#334155; --pro:#f59e0b; --err:#ef4444; }
body{margin:0;font-family: Arial, sans-serif;background:var(--bg);color:white;padding-bottom:50px;}
header{text-align:center;padding:25px;background:#0f172a;border-bottom:4px solid var(--pro);}
header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
header p { margin: 5px 0 0 0; color: var(--pro); font-weight: bold; font-size: 0.8rem; text-transform: uppercase;}
.container{max-width:1100px;margin:auto;padding:10px;}
.card{background:var(--card);padding:15px;border-radius:12px;margin-top:15px;border:1px solid var(--border);}
h3{margin-top:0;color:var(--accent);font-size:1rem;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:10px;}
.grid{display:grid;grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));gap:10px;margin-bottom:10px;}
input,select{width:100%;padding:8px;background:#0f172a;color:white;border:1px solid var(--border);border-radius:4px;box-sizing: border-box;font-size:0.85rem;}
button{width:100%;padding:15px;margin-top:15px;background:var(--accent);border:none;font-weight:bold;cursor:pointer;border-radius:4px;font-size:1rem;color:#020617;}
.result{white-space:pre-wrap;margin-top:20px;background:#000;padding:25px;display:none;border-radius:8px;font-family: 'Courier New', monospace;font-size:0.85rem;border:1px solid var(--accent);line-height:1.4;}
label{font-size:0.7rem;color:var(--text);display:block;margin-bottom:3px;}
.settings-panel { background: #1e293b; padding: 15px; border-radius: 8px; border-left: 4px solid var(--pro); margin-top: 15px; }
.ac-group { border: 1px dashed var(--border); padding: 8px; border-radius: 4px; margin-top: 5px; }
.badge { background: var(--pro); color: #000; padding: 2px 6px; border-radius: 3px; font-size: 0.6rem; vertical-align: middle; margin-left: 10px; }
.validation-msg { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--err); color: var(--err); padding: 10px; border-radius: 6px; margin-top: 15px; display: none; font-size: 0.8rem; }
.validation-msg b { display: block; margin-bottom: 5px; }
</style>
</head>
<body>

<header>
    <h1>VOLTMASTER PRO <span class="badge">v1.3 FINAL</span></h1>
    <p>Professional Electrical Design & Compliance Suite</p>
</header>

<div class="container">
    <div class="card">
        <h3>1. Project & Branding</h3>
        <div class="grid">
            <div><label>Company Name</label><input id="compName" placeholder="Volt Solutions Sdn Bhd" type="text"></div>
            <div><label>Prepared By</label><input id="prepBy" placeholder="Engineer Name" type="text"></div>
            <div><label>Project Ref</label><input id="projRef" placeholder="PROJ/2026/001" type="text"></div>
        </div>
    </div>

    <div class="settings-panel">
        <h3 style="color:var(--pro); border-color:var(--pro)">Pro Setting: Dynamic Pricing (RM)</h3>
        <div class="grid">
            <div><label>Light/Fan Pt</label><input id="rateL" value="85" type="number"></div>
            <div><label>Socket Point</label><input id="rateS" value="160" type="number"></div>
            <div><label>Aircond Point</label><input id="rateAC" value="250" type="number"></div>
            <div><label>Water Heater Pt</label><input id="rateWH" value="280" type="number"></div>
            <div><label>Outdoor Light Pt</label><input id="rateOL" value="120" type="number"></div>
            <div><label>DB Base Rate</label><input id="rateDB" value="650" type="number"></div>
        </div>
    </div>

    <div class="card">
        <h3>2. System Configuration</h3>
        <div class="grid">
            <div><label>Supply System</label><select id="phaseType" onchange="validateInput()"><option value="1">1-Phase (230V)</option><option value="3">3-Phase (400V)</option></select></div>
            <div><label>Diversity (DF)</label><input id="pDF" value="Auto" disabled style="background:#0f172a; color:var(--pro); font-weight:bold;"></div>
            <div><label>Power Factor</label><input id="pPF" value="0.85" step="0.05" type="number"></div>
            <div><label>Wiring Style</label><select id="wireStyle"><option value="conduit">High Impact Conduit (ST Std)</option><option value="concealed">Concealed Wiring</option><option value="trunking">Steel Trunking</option></select></div>
        </div>
    </div>

    <div class="card">
        <h3>3. Load Quantities</h3>
        <div class="grid">
            <div><label>Lighting</label><input id="qL" value="10" type="number" oninput="validateInput()"></div>
            <div><label>Ceiling Fan</label><input id="qF" value="5" type="number" oninput="validateInput()"></div>
            <div><label>Exhaust Fan</label><input id="qEF" value="0" type="number" oninput="validateInput()"></div>
            <div><label>Socket Pts</label><input id="qS" value="12" type="number" oninput="validateInput()"></div>
            <div><label>Water Heater</label><input id="qWH" value="1" type="number" oninput="validateInput()"></div>
            <div><label>Outdoor Light</label><input id="qOL" value="2" type="number" oninput="validateInput()"></div>
        </div>
        <div class="grid">
            <div class="ac-group"><label>AC 1 (HP)</label><input id="hp1" value="1.0" step="0.5" type="number" oninput="validateInput()"><label>Qty</label><input id="qty1" value="1" type="number" oninput="validateInput()"></div>
            <div class="ac-group"><label>AC 2 (HP)</label><input id="hp2" value="1.5" step="0.5" type="number" oninput="validateInput()"><label>Qty</label><input id="qty2" value="0" type="number" oninput="validateInput()"></div>
            <div class="ac-group"><label>AC 3 (HP)</label><input id="hp3" value="2.5" step="0.5" type="number" oninput="validateInput()"><label>Qty</label><input id="qty3" value="0" type="number" oninput="validateInput()"></div>
        </div>
    </div>

    <div class="card">
        <h3>4. Technical Parameters</h3>
        <div class="grid">
            <div><label>Light (W)</label><input id="wL" value="15" type="number" oninput="validateInput()"></div>
            <div><label>Fan (W)</label><input id="wF" value="75" type="number" oninput="validateInput()"></div>
            <div><label>Exhaust (W)</label><input id="wEF" value="40" type="number" oninput="validateInput()"></div>
            <div><label>Outdoor (W)</label><input id="wOL" value="30" type="number" oninput="validateInput()"></div>
            <div><label>Heater (W)</label><input id="wWH" value="3000" type="number" oninput="validateInput()"></div>
            <div><label>Max. Length (m)</label><input id="cLen" value="30" type="number" oninput="validateInput()"></div>
        </div>
        <div class="grid">
            <div><label>Socket pts/Cct</label><select id="pS"><option value="2">2 (Radial)</option><option value="10">10 (Ring)</option></select></div>
        </div>

        <div id="vMsg" class="validation-msg"></div>

        <button id="genBtn" onclick="calc()">GENERATE PRO-SPEC COMPLIANCE REPORT</button>
        <div id="out" class="result"></div>
        <button id="pdfBtn" style="background:#334155;color:white;display:none;margin-top:10px;" onclick="pdf()">EXPORT 2-PAGE PDF</button>
    </div>
</div>

<script>
const breakers = [20, 32, 40, 63, 80, 100, 125];
const mvAM = { "1.5": 29, "2.5": 18, "4.0": 11, "6.0": 7.3, "10.0": 4.4, "16.0": 2.8, "25.0": 1.8 };

function validateInput() {
    const vMsg = document.getElementById('vMsg');
    let errors = [];
    const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;
    const phase = document.getElementById('phaseType').value;

    if(getVal('cLen') > 70) errors.push("WARNING: Jarak kabel > 70m akan menyebabkan Kejatuhan Voltan tinggi.");
    if(getVal('wWH') > 5000) errors.push("CAUTION: Watt Water Heater (>5kW) di luar julat domestik biasa.");
    if(phase == "1" && getVal('qty1') + getVal('qty2') + getVal('qty3') > 6) {
        errors.push("CRITICAL: Kuantiti AC terlalu tinggi untuk bekalan 1-Fasa. Syor tukar ke 3-Fasa.");
    }
    if(errors.length > 0) { vMsg.style.display = "block"; vMsg.innerHTML = "<b>⚠️ NOTA VALIDASI:</b>" + errors.map(e => "• " + e).join("<br>"); } 
    else { vMsg.style.display = "none"; }
}

function getACSpecs(hp) {
    if (hp <= 1.5) return { mcb: "16A", cable: "2.5mm²", val: 2.5 };
    if (hp <= 2.5) return { mcb: "20A", cable: "4.0mm²", val: 4.0 };
    return { mcb: "32A", cable: "6.0mm²", val: 6.0 };
}

function getContainmentSizing(cableSize, style) {
    if (style !== "conduit" && style !== "trunking") return "";
    if (cableSize <= 2.5) return style === "conduit" ? "Rec. Conduit: 20mm (3/4\")" : "Rec. Trunking: 50x50mm";
    if (cableSize <= 6.0) return style === "conduit" ? "Rec. Conduit: 25mm (1\")" : "Rec. Trunking: 75x75mm";
    return style === "conduit" ? "Rec. Conduit: 32mm (1-1/4\")" : "Rec. Trunking: 100x100mm";
}

function getDBRecommendation(ways, phase) {
    let size = ways <= 8 ? "12-Way" : ways <= 14 ? "18-Way" : ways <= 20 ? "24-Way" : ways <= 32 ? "36-Way" : "42-Way";
    return phase == "3" ? `${size} Metal Enclosure (TPN)` : `${size} PVC/Metal Enclosure (SPN)`;
}

function calc() {
    try {
        const getV = (id) => {
            const el = document.getElementById(id);
            return el ? (isNaN(parseFloat(el.value)) ? el.value : parseFloat(el.value)) : 0;
        };

        const phase = getV('phaseType');
        const wStyle = document.getElementById('wireStyle').value;
        const len = getV('cLen');
        const pf = getV('pPF');
        const dateStr = new Date().toLocaleDateString('en-GB');
        
        let totalMCB = 0, circuitLines = "";

        const loadL = getV('qL') * getV('wL'), loadF = getV('qF') * getV('wF'), loadEF = getV('qEF') * getV('wEF'),
              loadOL = getV('qOL') * getV('wOL'), loadS = getV('qS') * 250, loadWH = getV('qWH') * getV('wWH');
        
        let acTotalW = 0, acQty = 0, acRows = "", acArray = [];
        for(let i=1; i<=3; i++){
            let h = getV('hp'+i), q = getV('qty'+i);
            if(q > 0){
                let w = h * 746; acTotalW += (w * q); acQty += q;
                for(let j=0; j<q; j++) acArray.push(w);
                let s = getACSpecs(h);
                let contAC = getContainmentSizing(s.val, wStyle);
                acRows += `   - ${h}HP AC: Qty ${q} | MCB ${s.mcb} | Cable ${s.cable}\n${contAC?`     ${contAC}\n`:''}`;
            }
        }

        const mdL = (loadL + loadF + loadEF + loadOL) * 0.66;
        const sCcts = Math.ceil(getV('qS') / getV('pS'));
        const mdS = sCcts > 0 ? (250 * getV('pS')) + ((sCcts - 1) * (250 * getV('pS')) * 0.4) : 0;
        let fixedAppliances = [];
        if(getV('qWH') > 0) for(let i=0; i<getV('qWH'); i++) fixedAppliances.push(getV('wWH'));
        fixedAppliances = fixedAppliances.concat(acArray).sort((a,b) => b-a);
        let mdFixed = 0;
        fixedAppliances.forEach((watt, index) => { if(index < 2) mdFixed += watt; else mdFixed += (watt * 0.25); });

        const TCL = loadL + loadF + loadEF + loadOL + loadS + loadWH + acTotalW;
        const MD = mdL + mdS + mdFixed;
        document.getElementById('pDF').value = (MD / (TCL||1)).toFixed(2);

        const Ib = (phase == "1") ? MD / (230 * pf) : MD / (1.732 * 400 * pf);
        let mainS = breakers.find(b => b >= (Ib * 1.25)) || 63;
        if (phase == "1" && mainS < 32) mainS = 32;
        if (phase == "3" && mainS < 40) mainS = 40;

        const mainCab = (mainS <= 32) ? 6 : (mainS <= 40) ? 10 : (mainS <= 63) ? 16 : 25;
        let earthCab = (mainCab <= 16) ? mainCab : 16;
        if (phase == "3" && earthCab < 16) earthCab = 16;
        const vDropPct = ((mvAM[mainCab.toFixed(1)] || 2.8) * Ib * len) / (phase == "1" ? 2300 : 4000);

        const addRow = (qty, label, ptsPerCct, mcb, cable, cableVal, specsText, note = "") => {
            if (qty <= 0) return "";
            const circuits = Math.ceil(qty / ptsPerCct); totalMCB += circuits;
            let containment = getContainmentSizing(cableVal, wStyle);
            let noteText = note ? ` | ${note}` : "";
            return `${label}\n   - ${specsText} | Circuits: ${circuits} | MCB: ${mcb} | Cable: ${cable}${noteText}\n${containment?`     ${containment}\n`:''}\n`;
        };

        circuitLines += addRow(getV('qL'), "A. LIGHTING", 10, "6A", "1.5mm²", 1.5, `${getV('wL')}W/pt`);
        circuitLines += addRow(getV('qF'), "B. CEILING FANS", 10, "10A", "1.5mm²", 1.5, `${getV('wF')}W/pt`);
        circuitLines += addRow(getV('qEF'), "C. EXHAUST FANS", 10, "6A", "1.5mm²", 1.5, `${getV('wEF')}W/pt`);
        circuitLines += addRow(getV('qOL'), "D. OUTDOOR LIGHTS", 10, "6A", "1.5mm²", 1.5, `${getV('wOL')}W/pt`, "RCD: 30mA (Required)");

        if(getV('qS') > 0) {
            const cS = Math.ceil(getV('qS') / getV('pS')); totalMCB += cS;
            let contS = getContainmentSizing(4.0, wStyle);
            circuitLines += `E. SOCKET OUTLET\n   - Heavy Duty | Qty: ${getV('qS')} | Circuits: ${cS} | MCB: ${getV('pS')==10?'32A':'20A'} | Cable: 4.0mm²\n${contS?`     ${contS}\n`:''}\n`;
        }
        if(acQty > 0) { totalMCB += acQty; circuitLines += `F. AIR-CONDITIONING\n${acRows}\n`; }
        if(getV('qWH') > 0) {
            totalMCB += getV('qWH');
            let contWH = getContainmentSizing(4.0, wStyle);
            circuitLines += `G. WATER HEATER\n   - ${getV('wWH')}W/pt | Qty: ${getV('qWH')} | MCB: 20A | Cable: 4.0mm² | RCD: 10mA\n${contWH?`     ${contWH}\n`:''}\n`;
        }

        let mult = wStyle === 'concealed' ? 1.4 : wStyle === 'conduit' ? 1.25 : 1.1;
        let totalVal = (getV('qL')+getV('qF')+getV('qEF')+getV('qOL'))*getV('rateL')*mult + (getV('qS')*getV('rateS')*mult) + (acQty*getV('rateAC')*mult) + (getV('qWH')*getV('rateWH')*mult) + getV('rateDB');

        const report = `============================================================
              ${(getV('compName') || "VOLTMASTER PRO").toUpperCase()}
              ST COMPLIANCE TECHNICAL REPORT
============================================================
REF NO    : ${getV('projRef') || "PROJ-" + new Date().getTime()}
PREPARED BY: ${getV('prepBy') || "SYSTEM"}
DATE      : ${dateStr}
SYSTEM    : ${phase}-PHASE | PF: ${pf} | WIRING: ${wStyle.toUpperCase()}
------------------------------------------------------------
[1. INDIVIDUAL CIRCUIT DETAILS]
------------------------------------------------------------
${circuitLines || "No active loads."}
[2. DB & PROTECTION]
------------------------------------------------------------
Main Switch    : ${mainS}A
Incoming Cable : ${mainCab}mm² (Cu/PVC)
Earth Cable    : ${earthCab}mm² (G/Y)
Main RCD       : 63A / 100mA (Type A)
RCD (Outdoor)  : 30mA (Mandatory for Outdoor Ccts)
RCD (Heater)   : 10mA (Mandatory if WH exists)
Total MCB Ways : ${totalMCB} + 25% Spare

[3. TECHNICAL RECOMMENDATIONS]
------------------------------------------------------------
Recommended DB : ${getDBRecommendation(totalMCB, phase)}
Earth System   : TT-System | Earth Res.: < 10 Ohm

[4. DESIGN SUMMARY]
------------------------------------------------------------
Total Connected Load (TCL) : ${(TCL/1000).toFixed(2)} kW
Maximum Demand (MD)        : ${(MD/1000).toFixed(2)} kW
Auto Diversity Factor      : ${(MD/(TCL||1)).toFixed(2)}
Voltage Drop               : ${vDropPct.toFixed(2)}%
Status                     : ${vDropPct <= 4 ? 'PASSED (MS 1979)' : 'NON-COMPLIANT'}

[5. ESTIMATED COMMERCIAL VALUATION]
------------------------------------------------------------
ESTIMATED TOTAL: RM ${totalVal.toLocaleString()}

*CALCULATION BASED ON MS 1979 & ST GUIDELINES*
------------------------------------------------------------`;

        document.getElementById('out').style.display = "block";
        document.getElementById('out').innerText = report;
        document.getElementById('pdfBtn').style.display = "block";
    } catch (e) { alert("Error: " + e.message); }
}

async function pdf() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF('p', 'mm', 'a4');
    const outEl = document.getElementById('out');
    if (!outEl.innerText) return;
    const fullText = outEl.innerText;
    const sections = fullText.split("[2. DB & PROTECTION]");
    const p1 = sections[0].trim(), p2 = ("[2. DB & PROTECTION]" + (sections[1] || "")).trim();
    const header = (n) => {
        const c = document.getElementById('compName').value || "VOLTMASTER PRO";
        doc.setFont("helvetica", "bold"); doc.setFontSize(10); doc.setTextColor(34, 197, 94);
        doc.text(`${c.toUpperCase()} | COMPLIANCE REPORT`, 15, 15);
        doc.setFontSize(7); doc.setTextColor(150); doc.text(`Page ${n} of 2`, 185, 15);
        doc.line(15, 18, 195, 18);
    };
    header(1); doc.setFont("courier", "normal"); doc.setFontSize(9); doc.setTextColor(0,0,0);
    doc.text(doc.splitTextToSize(p1, 180), 15, 30);
    doc.addPage(); header(2); doc.text(doc.splitTextToSize(p2, 180), 15, 30);
    doc.save("VoltMaster_Pro_Report.pdf");
}
</script>
</body>
</html>
